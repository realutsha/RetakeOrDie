<!DOCTYPE html>
<html>
<head>
<title>RetakeOrDie 💀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #061526;
  color: white;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

h1 {
  color: #00e0ff;
  text-shadow: 0 0 10px #00e0ff;
}

canvas {
  display: block;
  margin: auto;
  background: linear-gradient(#0b2a4a, #020817);
  border: 3px solid #00e0ff;
  border-radius: 16px;
  width: 92vw;
  max-width: 420px;
  height: 72vh;
}

#popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.box {
  background: #111;
  padding: 25px;
  border-radius: 15px;
  width: 80%;
  max-width: 320px;
}

button, a {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  text-decoration: none;
}

.try { background:#00e0ff; color:black; }
.follow { background:#ff3333; color:white; }
</style>
</head>

<body>

<h1>RetakeOrDie 💀</h1>

<canvas id="game"></canvas>

<div id="popup">
  <div class="box">
    <h2>RETAKE 💀</h2>
    <p id="msg"></p>

    <button class="try" id="tryBtn">Try Again 🔁</button>

    <!-- ✅ Safari + Chrome SAFE -->
    <a class="follow" href="https://www.facebook.com/RealUtsha" target="_blank">
      Follow the Donkey 🫏
    </a>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 420;
canvas.height = 600;

let donkey, pipes, cgpa, gameOver, velocity;

function resetGame() {
  donkey = {x:80,y:250};
  velocity = 0;
  pipes = [];
  cgpa = 4.00;
  gameOver = false;
  document.getElementById("popup").style.display="none";
}

document.getElementById("tryBtn").onclick = function(e){
  e.stopPropagation();
  resetGame();
};

function jump(){
  if(!gameOver) velocity = -7;
}

document.addEventListener("click",function(e){
  if(e.target.tagName==="BUTTON" || e.target.tagName==="A") return;
  jump();
});

document.addEventListener("touchstart",function(e){
  if(e.target.tagName==="BUTTON" || e.target.tagName==="A") return;
  e.preventDefault();
  jump();
},{passive:false});

function createPipe(){
  let top=Math.random()*250+50;
  pipes.push({x:420,top:top,bot:top+150});
}

function hit(){
  cgpa-=0.25;
  if(cgpa<=0){
    cgpa=0;
    gameOver=true;
    document.getElementById("msg").innerText="CGPA dropped to 0.00 💀";
    document.getElementById("popup").style.display="flex";
  }
}

function draw(){
  ctx.clearRect(0,0,420,600);

  // donkey
  ctx.font="40px Arial";
  ctx.fillText("🫏",donkey.x,donkey.y);

  // pipes
  pipes.forEach(p=>{
    ctx.fillStyle="red";
    ctx.fillRect(p.x,0,60,p.top);
    ctx.fillRect(p.x,p.bot,60,600);

    if(donkey.x< p.x+60 && donkey.x+20>p.x &&
      (donkey.y<p.top || donkey.y>p.bot)){
      hit();
    }

    p.x-=3;
  });

  velocity+=0.5;
  donkey.y+=velocity;

  if(donkey.y>600 || donkey.y<0) hit();

  ctx.fillStyle="white";
  ctx.fillText("CGPA: "+cgpa.toFixed(2),10,20);
}

setInterval(()=>{if(!gameOver)createPipe();},1500);
setInterval(()=>{if(!gameOver)draw();},30);

resetGame();
</script>

</body>
</html>
