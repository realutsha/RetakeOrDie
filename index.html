<!DOCTYPE html>
<html>
<head>
<title>RetakeOrDie 💀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #061526;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin: 12px 0 4px;
  color: #00e0ff;
  text-shadow: 0 0 12px #00e0ff;
  font-size: 24px;
}

p {
  margin: 0 0 8px;
  color: #c9eaff;
  font-size: 14px;
}

canvas {
  display: block;
  margin: auto;
  background: linear-gradient(#0b2a4a, #020817);
  border: 3px solid #00e0ff;
  border-radius: 16px;
  box-shadow: 0 0 25px #00e0ff;
  width: 92vw;
  max-width: 420px;
  height: 72vh;
}

#popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  padding: 24px;
  border-radius: 18px;
  box-shadow: 0 0 25px red;
  width: 75%;
  max-width: 320px;
  z-index: 99;
}

button {
  padding: 12px 18px;
  margin: 8px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.try { background: #00e0ff; color: black; }
.follow { background: #ff3333; color: white; }
</style>
</head>

<body>

<h1>RetakeOrDie 💀</h1>
<p>Tap to jump 🫏 | Avoid retake pipes</p>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="game"></canvas>

<div id="popup">
  <h2>RETAKE CONFIRMED 💀</h2>
  <p id="msg">CGPT became 0.00</p>
  <button class="try" onclick="location.reload()">Try Again 🔁</button>
  <button class="follow" onclick="window.location.href='https://www.facebook.com/RealUtsha'">Follow ❤️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const music = document.getElementById("music");

canvas.width = 420;
canvas.height = 600;

let donkey = {
  x: 80,
  y: 260,
  size: 26,
  velocity: 0
};

let gravity = 0.35;
let jumpPower = -7;
let pipes = [];
let score = 0;
let cgpt = 4.00;
let gameOver = false;
let speed = 2.2;
let frame = 0;
let started = false;
let musicStarted = false;

const roasts = [
  "Bro studied 5 min before exam 💀",
  "Attendance said bye bye 😂",
  "Viva sir destroyed you 😭",
  "Assignment submitted wrong file 🤡",
  "CGPT crashed 💻",
  "Retake loading... 99%"
];

function startMusic() {
  if (!musicStarted) {
    music.volume = 0.45;
    music.play().catch(() => {});
    musicStarted = true;
  }
}

function jump() {
  startMusic();
  started = true;
  if (!gameOver) {
    donkey.velocity = jumpPower;
  }
}

document.addEventListener("click", jump);
document.addEventListener("touchstart", function(e) {
  e.preventDefault();
  jump();
}, { passive: false });

document.addEventListener("keydown", function(e) {
  if (e.code === "Space") jump();
});

function createPipe() {
  let top = Math.random() * 230 + 60;
  pipes.push({
    x: canvas.width,
    top: top,
    bottom: top + 180,
    hit: false,
    passed: false
  });
}

function hit(pipe) {
  if (pipe && pipe.hit) return;
  if (pipe) pipe.hit = true;

  cgpt -= 0.25;

  const msg = roasts[Math.floor(Math.random() * roasts.length)];
  document.getElementById("msg").innerText = msg;

  if (cgpt <= 0) {
    cgpt = 0;
    gameOver = true;
    document.getElementById("popup").style.display = "block";
  }
}

function drawDonkey() {
  ctx.save();
  ctx.shadowColor = "#00e0ff";
  ctx.shadowBlur = 18;
  ctx.font = "44px Arial";
  ctx.fillText("🫏", donkey.x - 22, donkey.y + 15);
  ctx.restore();
}

function drawPipes() {
  pipes.forEach(pipe => {
    ctx.fillStyle = "#ff3333";
    ctx.fillRect(pipe.x, 0, 70, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, 70, canvas.height - pipe.bottom);

    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.fillText("RETAKE", pipe.x + 8, pipe.top - 12);
    ctx.fillText("EXAM", pipe.x + 16, pipe.bottom + 24);
  });
}

function drawText() {
  ctx.fillStyle = "white";
  ctx.font = "22px Arial";
  ctx.fillText("Score: " + score, 16, 35);

  ctx.fillStyle = "#00e0ff";
  ctx.fillText("CGPT: " + cgpt.toFixed(2), 16, 65);

  if (!started) {
    ctx.fillStyle = "#ffd166";
    ctx.font = "20px Arial";
    ctx.fillText("Tap to Start 🫏", 140, 300);
  }
}

function update() {
  if (gameOver) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (started) {
    frame++;

    donkey.velocity += gravity;
    donkey.y += donkey.velocity;

    if (frame % 110 === 0) {
      createPipe();
    }

    pipes.forEach(pipe => {
      pipe.x -= speed;

      if (
        donkey.x + donkey.size > pipe.x &&
        donkey.x - donkey.size < pipe.x + 70 &&
        (donkey.y - donkey.size < pipe.top || donkey.y + donkey.size > pipe.bottom)
      ) {
        hit(pipe);
      }

      if (!pipe.passed && pipe.x + 70 < donkey.x) {
        score++;
        pipe.passed = true;
        if (score % 4 === 0) speed += 0.25;
      }
    });

    pipes = pipes.filter(pipe => pipe.x + 70 > 0);

    if (donkey.y > canvas.height - 30 || donkey.y < 20) {
      donkey.y = 260;
      donkey.velocity = 0;
      hit(null);
    }
  }

  drawPipes();
  drawDonkey();
  drawText();

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
